name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run go fmt
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./cmd/lc/... ./internal/...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2023.1.7"
          install-go: false

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="lc-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${output}.exe"
          fi
          go build -ldflags "-X main.Version=ci-${GITHUB_SHA::7} -X main.BuildTime=$(date -u +%Y-%m-%d-%H:%M:%S)" -o "bin/${output}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/lc-*

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./internal/...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        run: make build

      - name: Run CLI tests
        run: go test -v ./e2e/cli/...

      - name: Run integration tests
        env:
          LC_WORKSPACE_KEY: ${{ secrets.LC_WORKSPACE_KEY }}
          LC_WORKSPACE_NAME: ${{ secrets.LC_WORKSPACE_NAME }}
        run: |
          cd /tmp
          go test -v ${{ github.workspace }}/e2e/integration/... -timeout 30m
