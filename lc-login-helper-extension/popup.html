<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 400px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
        }

        h3 {
            margin: 0 0 15px 0;
            color: #333;
        }

        .cookie-value {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            border: 2px solid #007bff;
            cursor: pointer;
            user-select: all;
            margin: 10px 0;
            font-size: 13px;
        }

        .cookie-value:hover {
            background: #e9ecef;
        }

        .command-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 32px 12px 12px;
            border-radius: 5px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid #444;
            cursor: pointer;
            position: relative;
        }

        .command-box:hover {
            background: #2d2d2d;
        }

        .command-box .copy-icon {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 14px;
        }

        .command-box:hover .copy-icon {
            color: #fff;
        }

        .command-label {
            color: #666;
            font-size: 12px;
            margin: 15px 0 5px 0;
        }

        .success-tip {
            color: #28a745;
            font-size: 12px;
            margin-top: 5px;
        }

        .hint {
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .status {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        .error {
            color: #dc3545;
            padding: 10px;
            background: #f8d7da;
            border-radius: 5px;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #218838;
        }

        .tab-btn {
            display: inline-block;
            padding: 4px 12px;
            font-size: 12px;
            color: #666;
            background: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
        }

        .tab-btn:hover {
            background: #e9ecef;
        }

        .tab-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .promo-tip {
            background: #e7f3ff;
            border-left: 3px solid #007bff;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 12px;
            color: #0056b3;
            border-radius: 0 4px 4px 0;
        }

        .promo-section {
            background: #fff8e6;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
        }

        .promo-title {
            color: #e65100;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .promo-desc {
            color: #f57c00;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .promo-box {
            background: #ff9800;
            color: #fff;
            padding: 10px 32px 10px 12px;
            border-radius: 5px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid #f57c00;
            cursor: pointer;
            position: relative;
        }

        .promo-box:hover {
            background: #f57c00;
        }

        .promo-box .copy-icon {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .promo-box:hover .copy-icon {
            color: #fff;
        }
    </style>
</head>

<body>
    <h3>灵畿 CLI 助手</h3>
    <div id="content">
        <div class="status">正在获取认证信息...</div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
